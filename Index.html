<!DOCTYPE html>
<html>
<head>
  <title>ID Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f4f8;
      margin: 0;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h2 {
      margin: 0;
      color: #0077b6;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
    }
    .input-section {
      width: 100%;
      max-width: 400px;
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }
    button#searchBtn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #0077b6;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button#searchBtn:hover {
      background: #005f8e;
    }
    #result {
      padding: 40px 0;
      width: 100%;
    }
    #printArea {
      max-width: 500px;
      margin: auto;
    }
    #printArea label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
      font-size: 16px;
    }
    .name-container {
      position: relative;
      margin-top: 12px;
      padding-right: 80px;
    }
    .eidc-emoji-link {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 64px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .eidc-emoji-link span {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 2px;
      color: #333;
    }
    .pdf-links {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 10px;
      margin-top: 30px;
      padding-bottom: 5px;
      justify-content: center;
      align-items: center;
      scrollbar-width: none;
      border-top: 2px dashed #333;
      padding-top: 20px;
      margin-top: 30px;
    }
    .pdf-links::-webkit-scrollbar {
      display: none;
    }
    .pdf-card {
      width: 70px;
      min-width: 70px;
      padding: 8px 4px;
      background: #ffffff;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      color: #000;
      border: 1.5px solid #e0e0e0;
      transition: all 0.2s ease-in-out;
      font-size: 11px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .pdf-card:hover,
    .pdf-card:focus,
    .pdf-card:active {
      background-color: #f0faff;
      border: 1.5px solid #0077b6;
      outline: none;
    }
    .pdf-icon {
      font-size: 18px;
      margin-bottom: 4px;
    }
    .pdf-label {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      text-align: center;
    }
    #barcode-wrapper {
      text-align: center;
      margin-top: 30px;
    }
    #barcode-text {
      font-size: 12px;
      margin-top: 5px;
    }
    @media print {
      body * {
        visibility: hidden;
      }
      #printArea, #printArea * {
        visibility: visible;
      }
      #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
      .pdf-card,
      #printBtn,
      .input-section {
        display: none !important;
      }
      #barcode-wrapper {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 150px;
      }
      #barcode {
        width: 150px !important;
        height: 60px !important;
      }
      #barcode-text {
        font-size: 10px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>EMPLOYEE INFORMATION UNIT</h2>
    <p>EC UNIT<strong>Enter</strong> or click <strong>Search</strong></p>
  </div>
  <div class="card">
    <div class="input-section">
      <input type="text" id="idInput" placeholder="Enter your ID number">
      <button id="searchBtn" onclick="searchID()">Search</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const data = {
     "10289": {
        name: "W.D SULAKSHANA PRAMOD WEERASINGHE",
        nic: "992143142V",
        address: "No. 45, Vijay Green Road, Kandy",
        dob: "2000-04-15",
        phone: "0711234567",
        companyLink: "https://example.com/company-id.pdf",
        pdfs: [
          { name: "NIC Card", url: "https://example.com/files/nic.pdf" },
          { name: "Birthday Certificate", url: "https://example.com/files/birthday.pdf" },
          { name: "Education Certificate", url: "https://example.com/files/education.pdf" }
        ]
      },

     "10288": {
        name: "Sandun Tharindu",
        nic: "200045678901",
        address: "No. 45, Vijay Green Road, Kandy",
        dob: "2000-04-15",
        phone: "0711234567",
        companyLink: "https://example.com/company-id.pdf",
        pdfs: [
          { name: "NIC Card", url: "https://example.com/files/nic.pdf" },
          { name: "Birthday Certificate", url: "https://example.com/files/birthday.pdf" },
          { name: "Education Certificate", url: "https://example.com/files/education.pdf" }
        ]
      }
    };

    function searchID() {
      const id = document.getElementById("idInput").value.trim();
      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";

      if (!id) {
        resultDiv.innerHTML = `<span style="color:red;">Please enter an ID number.</span>`;
        return;
      }

      const person = data[id];
      if (person) {
        let pdfHTML = `<div class="pdf-links">`;
        if (person.pdfs?.length > 0) {
          person.pdfs.forEach(pdf => {
            const icon = pdf.name.includes("Birth") ? "🎂" :
                         pdf.name.includes("Education") ? "🎓" : "🆔";
            const label = pdf.name.includes("NIC") ? "NIC Card Information" :
                          pdf.name.includes("Birth") ? "Birth Day Certificate" :
                          pdf.name;
            pdfHTML += `
              <a href="${pdf.url}" target="_blank" class="pdf-card">
                <div class="pdf-icon">${icon}</div>
                <div class="pdf-label">${label}</div>
              </a>`;
          });
        }
        pdfHTML += `</div>`;

        resultDiv.innerHTML = `
          <div id="printArea">
            <div class="name-container">
              <label>Name</label>
              <a href="${person.companyLink}" target="_blank" class="eidc-emoji-link">
                <span style="font-size:16px; font-weight:bold;">EID CARD</span>
                🪪
              </a>
              ${person.name}
            </div>
            <label>NIC Number</label> ${person.nic}
            <label>Address</label> ${person.address}
            <label>Date of Birth</label> ${person.dob}
            <label>Phone Number</label> ${person.phone}
            ${pdfHTML}
            <div id="barcode-wrapper">
              <svg id="barcode"></svg>
              <div id="barcode-text">Scan NIC Barcode</div>
            </div>
          </div>
        `;

        JsBarcode("#barcode", person.nic, {
          format: "CODE128",
          lineColor: "#000",
          width: 2,
          height: 60,
          displayValue: true
        });
      } else {
        resultDiv.innerHTML = `<span style="color:red;">No data found for ID <b>${id}</b>.</span>`;
      }
    }

    document.getElementById("idInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        searchID();
      }
    });
  </script>
</body>
</html>
